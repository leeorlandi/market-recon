<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080c10;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.7;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid #21262d;
    }

    nav a.wordmark {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 15px;
      color: #f0883e;
      text-decoration: none;
      letter-spacing: 0.02em;
    }

    nav a.github {
      font-size: 13px;
      color: #7d8590;
      text-decoration: none;
      border: 1px solid #21262d;
      padding: 6px 14px;
      border-radius: 6px;
      transition: border-color 0.15s, color 0.15s;
    }

    nav a.github:hover { border-color: #7d8590; color: #e6edf3; }

    .content {
      max-width: 820px;
      margin: 0 auto;
      padding: 60px 40px;
    }

    h1 { font-size: 2rem; font-weight: 600; color: #e6edf3; margin-bottom: 12px; }
    h2 { font-size: 1.4rem; font-weight: 600; color: #e6edf3; margin: 48px 0 16px; padding-top: 16px; border-top: 1px solid #21262d; }
    h3 { font-size: 1.1rem; font-weight: 600; color: #e6edf3; margin: 32px 0 12px; }

    p { margin-bottom: 16px; color: #c9d1d9; }

    a { color: #f0883e; text-decoration: none; }
    a:hover { text-decoration: underline; }

    pre {
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 20px 24px;
      overflow-x: auto;
      margin: 20px 0;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
      line-height: 1.6;
      color: #e6edf3;
    }

    code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      background: #161b22;
      border: 1px solid #21262d;
      padding: 2px 6px;
      border-radius: 4px;
      color: #e6edf3;
    }

    pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: inherit;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      font-size: 14px;
    }

    th {
      text-align: left;
      padding: 10px 16px;
      background: #0d1117;
      border: 1px solid #21262d;
      color: #7d8590;
      font-weight: 500;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    td {
      padding: 10px 16px;
      border: 1px solid #21262d;
      color: #c9d1d9;
      vertical-align: top;
    }

    tr:nth-child(even) td { background: #0d1117; }

    blockquote {
      border-left: 3px solid #f0883e;
      padding: 4px 20px;
      margin: 20px 0;
      color: #7d8590;
      font-style: italic;
    }

    hr {
      border: none;
      border-top: 1px solid #21262d;
      margin: 40px 0;
    }

    ul, ol { padding-left: 24px; margin-bottom: 16px; color: #c9d1d9; }
    li { margin-bottom: 6px; }

    sup { font-size: 11px; }
    sup a { color: #7d8590; }

    footer {
      text-align: center;
      padding: 40px;
      border-top: 1px solid #21262d;
      color: #484f58;
      font-size: 13px;
      margin-top: 80px;
    }

    footer a { color: #484f58; }
    footer a:hover { color: #7d8590; }
  </style>
</head>
<body>
  <nav>
    <a href="{{ site.baseurl }}/" class="wordmark">market-recon</a>
    <a href="https://github.com/leeorlandi/market-recon" class="github">GitHub →</a>
  </nav>
  <div class="content">
    {{ content }}
  </div>
  <footer>
    <a href="https://github.com/leeorlandi/market-recon">market-recon</a> · MIT License · Built with Claude Code
  </footer>
</body>
</html>
